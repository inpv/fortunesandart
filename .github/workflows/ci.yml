name: CI — pytest + Allure + Deploy to prod

on:
  push:
    branches: [ "**" ]
  pull_request:
  schedule:
    - cron: '0 4 * * *'      # 04:00 UTC daily
  workflow_dispatch:         # just in case

jobs:
  get-prod-python-version:
    if: ${{ github.repository == 'inpv/fortunesandart' }}
    runs-on: [ self-hosted, linux, X64 ]
    outputs:
      python-version: ${{ steps.get-version.outputs.stdout }}
    steps:
      - name: Get Python version from prod
        id: get-version
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_PI3_HOST }}
          username: ${{ secrets.SSH_PI3_USER }}
          key: ${{ secrets.SSH_PI3_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PI3_PORT }}
          capture_stdout: true
          script: |
            # Get the clean major.minor version that setup-python expects
            PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>/dev/null || echo "3.11")
            echo "$PYTHON_VERSION"

  test:
    needs: get-prod-python-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ needs.get-prod-python-version.outputs.python-version }}

      - name: Create virtualenv & install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pip install allure-pytest allure-python-commons pytest

      - name: Run pytest (generate Allure results)
        run: |
          . .venv/bin/activate
          mkdir -p ./artifacts/allure-results
          pytest -q --alluredir=./artifacts/allure-results

      - name: Upload allure-results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: ./artifacts/allure-results

  publish-allure:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - name: Download allure-results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ./allure-results

      - name: Install allure commandline
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre
          wget -q -O /tmp/allure.zip https://github.com/allure-framework/allure2/releases/download/2.21.0/allure-2.21.0.zip
          unzip -q /tmp/allure.zip -d $HOME/.allure
          echo "$HOME/.allure/allure-2.21.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report (HTML)
        run: |
          allure generate ./allure-results -o ./allure-report --clean

      - name: Upload artifact (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: ./allure-report

  copy-allure:
    needs: [test, publish-allure]
    if: ${{ always() && github.ref == 'refs/heads/master' && github.repository == 'inpv/fortunesandart' }}
    runs-on: [ self-hosted, linux, X64 ]
    outputs:
      PROJECT_NAME: ${{ env.PROJECT_NAME }}
      RESULTS_DIR: ${{ env.RESULTS_DIR }}
      REPORTS_DIR: ${{ env.REPORTS_DIR }}
      EXEC_NAME: ${{ env.EXEC_NAME }}

    steps:
      - name: Prepare Allure directories and set env vars on self-hosted runner
        run: |
          echo "Setting up directories and names"
          PROJECT_NAME=$(basename `git rev-parse --show-toplevel`)
          PROJECT_DIR="$HOME/allure-server/$PROJECT_NAME"
          RESULTS_DIR=$PROJECT_DIR/allure-results
          REPORTS_DIR=$PROJECT_DIR/allure-reports
          EXEC_NAME="Github Actions runner"
          
          echo "Checking if project folder exists"
          if [ -d "$PROJECT_DIR" ]; then
              echo "Project folder exists, proceeding..."
          else
              echo "Project folder missing, creating $PROJECT_DIR"
              mkdir -p $RESULTS_DIR
              mkdir -p $REPORTS_DIR
          fi
          
          echo "Creating clean slate"
          rm -rf "$RESULTS_DIR"/*
          rm -rf "$REPORTS_DIR"/*

          echo "Setting up env vars"
          echo "RESULTS_DIR=$RESULTS_DIR" >> $GITHUB_ENV
          echo "REPORTS_DIR=$REPORTS_DIR" >> $GITHUB_ENV
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
          echo "EXEC_NAME=$EXEC_NAME" >> $GITHUB_ENV

      - name: Download allure-results artifact (raw JSON test results)
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ${{ env.RESULTS_DIR }}

      - name: Download allure-report-html artifact (pre-generated HTML report)
        uses: actions/download-artifact@v4
        with:
          name: allure-report-html
          path: ${{ env.REPORTS_DIR }}

      - name: Send Allure results to local server
        run: |
          # Use Allure Docker Service API to upload results, otherwise the container with monitoring off won't pick them

          cd ${{ env.RESULTS_DIR }}

          for file in *.json; do
            echo "Uploading $file"
            curl -X POST "http://localhost:5050/allure-docker-service/send-results?project_id=${{ env.PROJECT_NAME }}&force_project_creation=true" \
                 -H "Content-Type: multipart/form-data" \
                 -F "files[]=@$file"
          done

          curl -X GET "http://localhost:5050/allure-docker-service/generate-report?project_id=${{ env.PROJECT_NAME }}&execution_name=${EXEC_NAME// /%20}"

  deploy:
    needs: [ test, publish-allure, copy-allure ]
    if: ${{ success() && github.ref == 'refs/heads/master' && github.repository == 'inpv/fortunesandart' }}
    runs-on: [ self-hosted, linux, X64 ]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to prod
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_PI3_HOST }}
          username: ${{ secrets.SSH_PI3_USER }}
          key: ${{ secrets.SSH_PI3_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PI3_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin master
            echo "Deployed commit $(git rev-parse --short HEAD)"
            echo "Code for ${{ needs.copy-allure.outputs.PROJECT_NAME }} deployed to prod"

  daily-run:
    needs: [ test, publish-allure, copy-allure ]
    if: ${{ success() && github.repository == 'inpv/fortunesandart' && github.event_name == 'schedule' }}
    runs-on: [ self-hosted, linux, X64 ]
    steps:
      - name: Trigger daily launcher on prod (after successful tests)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_PI3_HOST }}
          username: ${{ secrets.SSH_PI3_USER }}
          key: ${{ secrets.SSH_PI3_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PI3_PORT }}
          script: |
            echo "=== CI tests passed → launching daily fortune bot ==="
            sudo systemctl start ${{ secrets.SERVICE_NAME }}
            echo "Daily bot run completed at $(date --utc)"
