name: CI — pytest + Allure + Deploy to Pi

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create virtualenv & install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pip install allure-pytest allure-python-commons pytest

      - name: Run pytest (generate Allure results)
        run: |
          . .venv/bin/activate
          mkdir -p ./artifacts/allure-results
          pytest -q --alluredir=./artifacts/allure-results

      - name: Upload allure-results artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./artifacts/allure-results
          
  publish-allure:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download allure-results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: ./allure-results

      - name: Install allure commandline
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre
          wget -q -O /tmp/allure.zip https://github.com/allure-framework/allure2/releases/download/2.21.0/allure-2.21.0.zip
          unzip -q /tmp/allure.zip -d $HOME/.allure
          echo "$HOME/.allure/allure-2.21.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report (HTML)
        run: |
          allure generate ./allure-results -o ./allure-report --clean

      - name: Upload artifact (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: ./allure-report

  deploy-to-pi:
    needs: [ test, publish-allure ]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy code + Allure results to Pi server, then generate a report in respected folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_PI3_HOST }}
          username: ${{ secrets.SSH_PI3_USER }}
          key: ${{ secrets.SSH_PI3_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PI3_PORT }}
          script: |
            PROJECT_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
            echo "Deploying project: $PROJECT_NAME"
            
            cd /opt/fortune_bot/fortunesandart
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            echo "Deployed commit $(git rev-parse --short HEAD)"
            echo "Code for $PROJECT_NAME deployed on server"

            PROJECT_DIR="$HOME/allure-server/$PROJECT_NAME"
            RESULTS_DIR=$PROJECT_DIR/allure-results
            
            if [ -d "$PROJECT_DIR" ]; then
                echo "Project folder exists, proceeding..."
            else
                echo "Project folder missing, creating $PROJECT_DIR"
                mkdir -p $RESULTS_DIR
            fi

            cp -r /tmp/github-actions-allure-results/$PROJECT_NAME/* $RESULTS_DIR/ 2>/dev/null || true
            curl -X POST 'http://localhost:5050/send-results?project_id=$PROJECT_NAME"
            echo "Allure results deployed and report generated on server for $PROJECT_NAME"
